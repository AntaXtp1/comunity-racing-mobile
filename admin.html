<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ===================== LOGIN VIEW ===================== -->
  <div class="login-view" id="loginView">
    <div class="login-card">
      <div class="login-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <h1 class="login-title">Admin Panel</h1>
      <p class="login-sub">Masukkan password untuk mengakses dashboard</p>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="passwordInput">Password</label>
          <div class="input-wrapper">
            <input type="password" id="passwordInput"
                   placeholder="••••••••••"
                   autocomplete="current-password"
                   required>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Tampilkan password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <i class="fa-solid fa-right-to-bracket"></i> Masuk
        </button>
        <p class="error-msg" id="loginError" role="alert"></p>
      </form>
    </div>
  </div>

  <!-- =================== DASHBOARD VIEW =================== -->
  <div class="dashboard-view" id="dashboardView" hidden>

    <!-- Header -->
    <header class="admin-header">
      <div class="admin-header-left">
        <h1 class="admin-title">
          <i class="fa-solid fa-gauge-high"></i> Dashboard
        </h1>
        <span class="admin-sub" id="adminSubtitle">Sim Racing Community</span>
      </div>
      <button class="btn-text" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </header>

    <!-- STORAGE INFO -->
    <div class="card" id="storageCard">
      <div class="card-header">
        <h2 class="card-title">
          <i class="fa-solid fa-database"></i> Storage R2
        </h2>
        <span class="storage-pct" id="storagePct">—</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="storageFill" style="width:0%"></div>
      </div>
      <p class="storage-label" id="storageLabel">Memuat info storage...</p>
    </div>

    <!-- UPLOAD -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">
          <i class="fa-solid fa-cloud-arrow-up"></i> Upload APK
        </h2>
      </div>

      <div class="dropzone" id="dropzone">
        <i class="fa-solid fa-cloud-arrow-up dropzone-icon"></i>
        <p class="dropzone-title">Drag &amp; drop file APK di sini</p>
        <p class="dropzone-sub">atau</p>
        <label class="btn btn-secondary" tabindex="0">
          <i class="fa-solid fa-folder-open"></i> Pilih File
          <input type="file" id="fileInput" hidden>
        </label>
      </div>

      <!-- Upload progress (hidden until upload starts) -->
      <div class="upload-progress" id="uploadProgress" hidden>
        <div class="progress-bar">
          <div class="progress-fill" id="uploadFill" style="width:0%"></div>
        </div>
        <p class="upload-label" id="uploadLabel">Mengupload 0%</p>
      </div>

      <div class="upload-result" id="uploadResult"></div>
    </div>

    <!-- FILE MANAGER -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">
          <i class="fa-solid fa-folder-open"></i> File Manager
        </h2>
        <button class="btn-text" id="refreshBtn">
          <i class="fa-solid fa-rotate"></i> Refresh
        </button>
      </div>
      <div class="file-list" id="fileList">
        <p class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Memuat...</p>
      </div>
    </div>

  </div><!-- end dashboard-view -->

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
